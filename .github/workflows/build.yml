name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check Java
        run: |
          java -version
          mvn -version

      - name: Build
        run: mvn -B clean verify

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: CoreProtect
          path: target/*.jar
